  type: GuidanceCatalog
  gemara-version: "0.20.0"
  description: >
    A comprehensive collection of risks and mitigations that support
    on-boarding, development of, and running Generative AI solutions.
  author:
    id: finos
    name: FINOS
    type: Human
  version: 0.1.0
